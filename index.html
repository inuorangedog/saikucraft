<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaikuCraft – もうすぐオープン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Kaisei+Opti:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fdf6ec;
      --warm: #f5e6d0;
      --peach: #f0c9a0;
      --coral: #e8956d;
      --brown: #7a4f3a;
      --dark: #3d2314;
      --ink: #2a1a0e;
    }

    body {
      background-color: var(--cream);
      font-family: 'Zen Maru Gothic', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 背景テクスチャ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, #f9e4ca44 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #f0c9a033 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, #fdf0e022 0%, transparent 70%);
      pointer-events: none;
    }

    /* 浮かぶ小物 */
    .floaties {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .floatie {
      position: absolute;
      opacity: 0.18;
      font-size: 2rem;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.18; }
      90%  { opacity: 0.18; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* メインカード */
    .card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
      border: 2px solid var(--peach);
      border-radius: 32px;
      padding: 56px 64px;
      max-width: 560px;
      width: calc(100% - 48px);
      text-align: center;
      position: relative;
      box-shadow:
        0 8px 40px rgba(122,79,58,0.10),
        0 2px 8px rgba(122,79,58,0.06),
        inset 0 1px 0 rgba(255,255,255,0.8);
      animation: cardIn 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* カード装飾 */
    .card::before {
      content: '';
      position: absolute;
      top: -2px; left: 24px; right: 24px;
      height: 4px;
      background: linear-gradient(90deg, var(--peach), var(--coral), var(--peach));
      border-radius: 0 0 4px 4px;
    }

    /* ロゴアイコン */
    .logo-wrap {
      margin-bottom: 20px;
      animation: cardIn 0.9s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--coral), var(--peach));
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 4px 16px rgba(232,149,109,0.35);
      transform: rotate(-4deg);
      transition: transform 0.3s ease;
    }

    .logo-icon:hover { transform: rotate(4deg) scale(1.08); }

    /* タイトル */
    .title {
      font-family: 'Kaisei Opti', serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--brown);
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 6px;
      animation: cardIn 0.9s 0.15s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .title span {
      color: var(--coral);
    }

    /* サブタイトル */
    .subtitle {
      font-size: 0.82rem;
      color: var(--coral);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 28px;
      animation: cardIn 0.9s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* 区切り */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto 28px;
      animation: cardIn 0.9s 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--peach));
    }

    .divider::after {
      background: linear-gradient(90deg, var(--peach), transparent);
    }

    .divider-icon { font-size: 1rem; }

    /* 説明文 */
    .desc {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--brown);
      margin-bottom: 32px;
      animation: cardIn 0.9s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .desc strong {
      color: var(--coral);
      font-weight: 700;
    }

    /* 特徴タグ */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 36px;
      animation: cardIn 0.9s 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .tag {
      background: var(--warm);
      border: 1.5px solid var(--peach);
      color: var(--brown);
      font-size: 0.78rem;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }

    .tag.accent {
      background: linear-gradient(135deg, var(--coral), #e07a50);
      border-color: var(--coral);
      color: white;
    }

    /* メールアドレス */
    .contact {
      animation: cardIn 0.9s 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .contact p {
      font-size: 0.8rem;
      color: #a07858;
      margin-bottom: 8px;
    }

    .contact a {
      display: inline-block;
      color: var(--coral);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1.5px dashed var(--peach);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .contact a:hover {
      color: var(--brown);
      border-color: var(--coral);
    }

    /* ぺんぎん的なかわいい手書き装飾 */
    .deco-top {
      position: absolute;
      top: -18px;
      right: 32px;
      font-size: 2rem;
      animation: wobble 3s ease-in-out infinite;
    }

    .deco-bottom {
      position: absolute;
      bottom: -16px;
      left: 32px;
      font-size: 1.6rem;
      animation: wobble 3.5s 1s ease-in-out infinite;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-8deg); }
      50%       { transform: rotate(8deg); }
    }

    /* フッター */
    .footer {
      margin-top: 28px;
      font-size: 0.72rem;
      color: #c0a080;
      animation: cardIn 0.9s 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px; }
      .title { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <!-- 浮かぶ絵文字 -->
  <div class="floaties" id="floaties"></div>

  <!-- メインカード -->
  <div class="card">
    <div class="deco-top">✏️</div>
    <div class="deco-bottom">🎨</div>

    <div class="logo-wrap">
      <div class="logo-icon">🖌️</div>
    </div>

    <div class="title">Saiku<span>Craft</span></div>
    <div class="subtitle">Coming Soon</div>

    <div class="divider"><span class="divider-icon">✦</span></div>

    <p class="desc">
      手で描く、心を込める。<br>
      そんなクリエイターと作り手をつなぐ<br>
      <strong>同人特化のコミッションサービス</strong>を<br>
      準備中です。もうすぐお会いしましょう。
    </p>

    <div class="tags">
      <span class="tag accent">AI使用禁止</span>
      <span class="tag">手描きの証明</span>
      <span class="tag">手数料 7%</span>
      <span class="tag">安心エスクロー</span>
      <span class="tag">同人特化</span>
    </div>

    <div class="contact">
      <p>お問い合わせ・βテスト参加希望</p>
      <a href="mailto:support@saikucraft.com">support@saikucraft.com</a>
    </div>
  </div>

  <div class="footer">© 2026 SaikuCraft</div>

  <script>
    // 浮かぶ絵文字を生成
    const emojis = ['✏️','🖌️','🎨','📝','✦','🌸','🎀','📖','🖊️','✿'];
    const container = document.getElementById('floaties');

    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'floatie';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (12 + Math.random() * 16) + 's';
      el.style.animationDelay = (Math.random() * 20) + 's';
      el.style.fontSize = (1.2 + Math.random() * 1.6) + 'rem';
      container.appendChild(el);
    }
  </script>
</body>
</html>
